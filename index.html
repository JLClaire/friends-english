<!doctype html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Clip Trainer</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header class="header">
    <h1>Clip Trainer</h1>
    <div class="row">
      <select id="clipSelect"></select>
      <span id="stepLabel" class="pill"></span>
    </div>
    <label class="hint">Speed:</label>
<select id="speedSelect">
  <option value="0.75">0.75×</option>
  <option value="1" selected>1×</option>
  <option value="1.25">1.25×</option>
  <option value="1.5">1.5×</option>
  <option value="2">2×</option>
</select>
  </header>

  <main class="grid">
    <section class="card">
      <video id="video" controls preload="metadata" playsinline></video>
      <audio id="audio" controls preload="metadata" class="hidden"></audio>
      <div class="hint" id="mediaHint"></div>
    </section>

    <section class="card">
      <div class="row">
        <button id="prevBtn">Prev</button>
        <button id="nextBtn" class="primary">Next</button>
        <button id="resetBtn">Reset</button>
      </div>

      <div id="step1" class="panel">
        <div class="hint">Step 1：无字幕看片段（可拖动进度条）</div>
      </div>

      <div id="step2" class="panel hidden">
        <div class="hint">Step 2：你可以点击任意一句跳转到对应时间，进行 shadowing（影子跟读）。建议：先 0.75× 听清，再 1× 跟读。
          ① 先不看中文，点句子跳转播放，跟读模仿语音语调；
          ② 英文默认显示，用来校准你听到的内容；
          ③ 看不懂再点 ZH 显示中文确认语义，然后立刻隐藏中文再跟读一次。
          这样做的原因：优先训练听力与输出，不让中文抢先“替你理解”。</div>
        <div id="subs"></div>
      </div>

      <div id="step3" class="panel hidden">
        <div class="hint">Step 3：逐句中译英（显示中文提示，填写英文）</div>
        <div id="translate"></div>
      </div>

      <div id="step4" class="panel hidden">
        <div class="hint">Step 4：对照 + 精华总结</div>
        <div id="review"></div>
        <h3>Highlights</h3>
        <div id="highlights"></div>
      </div>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>

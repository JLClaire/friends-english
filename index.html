<!doctype html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Clip Trainer</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header class="header">
    <h1>Clip Trainer</h1>
    <div class="row">
      <select id="clipSelect"></select>
      <span id="stepLabel" class="pill"></span>
    </div>
  </header>

  <main class="grid">
    <section class="card">
      <video id="video" controls preload="metadata" playsinline></video>
      <audio id="audio" controls preload="metadata" class="hidden"></audio>
      <div class="hint" id="mediaHint"></div>
    </section>

    <section class="card">
      <div class="row">
        <button id="prevBtn">Prev</button>
        <button id="nextBtn" class="primary">Next</button>
        <button id="resetBtn">Reset</button>
      </div>

      <div id="step1" class="panel">
        <div class="hint">Step 1：无字幕看片段（可拖动进度条）</div>
      </div>

      <div id="step2" class="panel hidden">
        <div class="hint">Step 2：英文句子列表（点击跳转播放，可当作英文字幕训练）</div>
        <div id="subs"></div>
      </div>

      <div id="step3" class="panel hidden">
        <div class="hint">Step 3：逐句中译英（显示中文提示，填写英文）</div>
        <div id="translate"></div>
      </div>

      <div id="step4" class="panel hidden">
        <div class="hint">Step 4：对照 + 精华总结</div>
        <div id="review"></div>
        <h3>Highlights</h3>
        <div id="highlights"></div>
      </div>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
